# Workaround for https://github.com/conda-forge/opencv-feedstock/issues/493
MACOSX_SDK_VERSION:  # [osx]
  - 15.5             # [osx]

# Qt is no longer a build-matrix axis: opencv is always compiled against Qt6 and
# the Qt window backend ships as a dynamically loaded plugin (opencv-qt6), so a
# single build serves both the headless and the GUI use cases.
