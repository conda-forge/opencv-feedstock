# This recipe compiles opencv once (on python_min) and splits the result into
# three packages: libopencv, py-opencv and opencv.
#
# libopencv holds the native C++ libraries, headers, cmake/pkg-config files and
# the opencv_* command line tools. It contains no python and is shared by every
# python version. opencv-dnn changes on most patch versions, so libopencv pins
# itself to the patch version x.x.x via run_exports.
#
# py-opencv holds the cv2 python bindings. They are compiled against CPython's
# stable ABI (abi3) using OpenCV's PYTHON3_LIMITED_API support, so a *single*
# build per dependency configuration (qt_version x hdf5) is produced on
# python_min and then works on every later python -- instead of one build per
# python minor version. conda-forge drives this through the is_abi3 /
# is_python_min / python_min variant variables and the python-abi3 host
# dependency (which supplies the `cpython >={{ python_min }}` lower bound). The
# bindings must be split out of libopencv because a python_version_independent
# (noarch/abi3) package may not contain native executables such as opencv_*.
#
# opencv is a backward compatible metapackage that depends on the exact
# libopencv and py-opencv builds, with no pinnings of its own.
{% set version = "5.0.0" %}
{% set major_version = version.split('.')[0] %}

{% set build = 0 %}

# Allow the qt version to be easily read from the build number 100's value.
# This used to be more important when we supported both qt5 and qt6
{% if qt_version == "6" %}
{% set build = build + 600 %}
{% endif %}

package:
  name: libopencv
  version: {{ version }}

source:
  - url: https://github.com/opencv/opencv/archive/{{ version }}.tar.gz
    fn: opencv-{{ version }}.tar.gz
    sha256: b0528f5a1d379d59d4701cb28c36e22214cc51cf64594e5b56f2d3e6c0233095
    patches:
      # backport https://github.com/opencv/opencv/pull/21611 (unmerged as of 06/2023)
      - patches_opencv/0001-Add-installation-of-pip-metadata-from-cmake.patch
      - patches_opencv/0001-Also-install-metadata-for-opencv-python-headless.patch
      - patches_opencv/0003-find-pkgconfig-on-windows.patch
      - patches_opencv/0004-fix-detection-for-protobuf-23.x.patch
      # PR #28678 removed opencv-caffe.proto upstream but left caffe_io.{cpp,hpp}
      # behind because tensorflow/tf_io.cpp still uses helpers declared there.
      # build.sh / bld.bat restore opencv-caffe.proto from recipe/ before cmake;
      # this patch puts it back in the PROTOBUF_UPDATE_FILES glob.
      - patches_opencv/0005-restore-caffe-proto-in-glob.patch
      # OpenCV 5.0 bundles a subset of MLAS but the upstream halfgemm.cpp and
      # halfgemm_kernel_neon.cpp were not imported; MlasHGemmSupported (called
      # on every target) and MlasHGemmDispatchNeon (used on aarch64) are
      # declared but not defined, breaking the libopencv_dnn link.
      - patches_opencv/0006-mlas-stub-MlasHGemmSupported.patch
      # The new imgproc warp kernels in 5.0 call v_fma() on v_int32 vectors,
      # but the VSX HAL only defines v_fma for floats. Add the missing
      # integer overload (mirroring the existing v_muladd one) so ppc64le
      # can compile modules/imgproc/src/imgwarp.cpp.
      - patches_opencv/0007-vsx-add-v_fma-for-v_int32x4.patch
  - url: https://github.com/opencv/opencv_contrib/archive/{{ version }}.tar.gz
    fn: opencv_contrib-{{ version }}.tar.gz
    sha256: c58f6344170c39abf187c56f3843b59cab1fd3e89cf19ba2ce25dc061659b27f
    folder: opencv_contrib
    patches:
      # Allow attempt to find HDF5 on cross-compile
      - patches_opencv_contrib/cmake_hdf5_xpile.patch
  - fn: test.avi
    url: https://github.com/opencv/opencv_extra/raw/master/testdata/highgui/video/VID00003-20100701-2204.avi
    sha256: 78884f64b564a3b06dc6ee731ed33b60c6d8cd864cea07f21d94ba0f90c7b310
  # OpenCV 5.0's bundled MLAS imports the .cpp / .S files under
  # 3rdparty/mlas/lib/power/ but not the three headers they include. Pull
  # them from the same upstream onnxruntime commit (62f742f1aa) that
  # OpenCV vendored, so build.sh can drop them into place before cmake.
  # See `3rdparty/mlas/README.md` in the OpenCV tarball for the pin.
  {% set ort_mlas_commit = "62f742f1aa0c3102745ed35e3d869eaee845b9ac" %}
  {% set ort_mlas_raw = "https://raw.githubusercontent.com/microsoft/onnxruntime/" ~ ort_mlas_commit ~ "/onnxruntime/core/mlas/lib/power" %}
  - fn: SgemmKernelpower.h
    url: {{ ort_mlas_raw }}/SgemmKernelpower.h
    sha256: 78cfd0db9a6cb48e00f101bbe4359cc5c679cd9b167ad050ed3c3882aabc73a5
    folder: mlas_power_headers
  - fn: FgemmKernelpower.h
    url: {{ ort_mlas_raw }}/FgemmKernelpower.h
    sha256: db12b360e2b3079294e2ad58b2b9dcc83483c4dec6b92c2931a7b6a7d4e2068d
    folder: mlas_power_headers
  - fn: asmmacro.h
    url: {{ ort_mlas_raw }}/asmmacro.h
    sha256: de8effd06029567f165e42e288c4644460e06b0efebd64016d8adb753e80c189
    folder: mlas_power_headers

build:
  number: {{ build }}
  # The whole project is compiled once on python_min (skip on any other
  # python). libopencv keeps the native C++ libraries and CLI tools, while the
  # cv2 python bindings are split into the python_version_independent py-opencv
  # output below. The bindings are built against CPython's stable ABI (abi3) via
  # -DPYTHON3_LIMITED_API=ON (see build.sh/bld.bat), so the single cv2.abi3.so
  # works on every later python. is_abi3/is_python_min/python_min come from the
  # conda-forge global pinning.
  skip: true                                                                      # [is_abi3 and not is_python_min]
  string: headless_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                             # [qt_version == "none"]
  string: qt{{ qt_version }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                   # [qt_version != "none"]
  run_exports:
    # https://abi-laboratory.pro/index.php?view=timeline&l=opencv
    # Things seem to change every patch versions, mostly the dnn module
    - {{ pin_subpackage('libopencv', max_pin='x.x.x') }}
  ignore_run_exports_from:
    # python and numpy are only needed to *build* the cv2 bindings; the C++
    # libopencv package must not gain a python/numpy run dependency from them.
    - python
    - numpy
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - libprotobuf                            # [build_platform != target_platform]
    - qt6-main                               # [build_platform != target_platform and qt_version == 6]
    # pkg-config is required to find ffpmeg
    - pkg-config
    - cmake
    - ninja
    - libgomp                        # [linux]
    # ICE when enabling this
    # - llvm-openmp                    # [osx]
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - libgl-devel                        # [linux and (qt_version == 5 or qt_version == 6)]
    - libegl-devel                       # [linux and (qt_version == 5 or qt_version == 6)]
    # python and numpy are only here to build the cv2 bindings; their run
    # exports are ignored above so libopencv stays a pure C++ package. The abi3
    # run-export (cpython >={{ python_min }}) is attached to py-opencv instead.
    - python
    - numpy
    - eigen
    # Specify lgpl version of ffmpeg so that there are
    # no questions about the license of the resulting opencv
    # binary
    - ffmpeg {{ ffmpeg }} lgpl_*
    - freetype
    - harfbuzz
    - hdf5
    # Ensure that we build with nompi variant
    # it provides downstream packages with the most flexibility
    - hdf5 * nompi*
    - openjpeg
    - libavif
    - libcblas
    - libiconv                       # [unix]
    - libjpeg-turbo
    - liblapack
    - liblapacke
    - libpng
    - libprotobuf
    - libtiff
    - libwebp
    - openexr
    - libjxl
    # While imath doesn't trigger overlinking warnings
    # It does seem to be linked to opencv - libopencv_imgcodecs
    # https://github.com/conda-forge/opencv-feedstock/issues/486
    - imath
    - qt6-main                       # [qt_version == 6]
    - zlib
    - libopenvino-dev                # [not ppc64le]
    # Why do I need expat here??? At the very least it helps find FFMPEG
    # And start the compilation on windows
    - expat

test:
  requires:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config                      # [not win]
    # Test with the two currently supported lapack implementatons.
    # Only a single (python_min) build now happens, so split the backends
    # across platforms instead of across python versions.
    - liblapack * *openblas           # [not linux64]
    - liblapack * *mkl                # [linux64]
    - cmake
    - ninja
  files:
    - CMakeLists.txt
    - test.cpp
  commands:
    # Verify dynamic libraries on all systems
    {% set win_ver_lib = version|replace(".", "") %}
    # The bot doesn't support multiline jinja, so use
    # single line jinja.
    # In OpenCV 5.0 calib3d -> calib, features2d -> features; aruco was merged
    # into objdetect and mcc was removed. geometry/ptcloud/signal/xstereo are new.
    {% set opencv_libs = ["alphamat", "bgsegm", "calib", "ccalib", "core", "datasets", "dnn", "dnn_objdetect", "dnn_superres", "dpm", "face", "features", "flann", "freetype", "fuzzy", "gapi", "geometry", "hfs", "highgui", "img_hash", "imgcodecs", "imgproc", "intensity_transform", "line_descriptor", "ml", "objdetect", "optflow", "phase_unwrapping", "photo", "plot", "ptcloud", "quality", "rapid", "reg", "rgbd", "saliency", "shape", "signal", "stereo", "stitching", "structured_light", "superres", "surface_matching", "text", "tracking", "video", "videoio", "videostab", "wechat_qrcode", "xfeatures2d", "ximgproc", "xobjdetect", "xphoto", "xstereo"] %}
    - export MACOSX_DEPLOYMENT_TARGET={{ MACOSX_DEPLOYMENT_TARGET }}          # [osx]
    # hmaarrfk - 2024/10
    # Need to specify a default value for CONDA_BUILD_SYSROOT
    # otherwise the bot seems to fail to help us update
    # https://github.com/conda-forge/opencv-feedstock/issues/280
    {% if CONDA_BUILD_SYSROOT is defined %}
    - export CONDA_BUILD_SYSROOT={{ CONDA_BUILD_SYSROOT }}      # [osx]
    {% endif %}
    - OPENCV_FLAGS="`pkg-config --cflags opencv{{ major_version }}`"          # [unix]
    - $CXX -std=c++11 $RECIPE_DIR/test.cpp ${OPENCV_FLAGS} -o test            # [unix]
    - if [[ $(./test) != $PKG_VERSION ]]; then exit 1 ; fi                    # [unix]
    {% for each_opencv_lib in opencv_libs %}
    - echo Testing for presence of {{ each_opencv_lib }}
    - test -f $PREFIX/lib/libopencv_{{ each_opencv_lib }}${SHLIB_EXT}         # [unix]
    - if not exist %PREFIX%\\Library\\bin\\opencv_{{ each_opencv_lib }}{{ win_ver_lib }}.dll exit 1      # [win]
    - echo Found                   {{ each_opencv_lib }}
    {% endfor %}
    - test -f $PREFIX/lib/libopencv_bioinspired${SHLIB_EXT}      # [unix]
    - test -f $PREFIX/lib/libopencv_hdf${SHLIB_EXT}              # [unix]
    - mkdir -p cmake_build_test && pushd cmake_build_test
    - cmake -G "Ninja" ..
    - cmake --build . --config Release
    - popd

outputs:
  - name: libopencv
    # libopencv carries the native C++ libraries, headers, cmake/pkgconfig
    # files and the opencv_* CLI tools. Everything the build installed EXCEPT
    # the cv2 python bindings, which go to the python_version_independent
    # py-opencv output. A noarch/abi3 package may not contain the opencv_*
    # binaries, which is why the split is required.
    files:
      include:
        - '**'
      exclude:
        - lib/python{{ python_min }}/site-packages/cv2                                      # [unix]
        - lib/python{{ python_min }}/site-packages/opencv_python-{{ version }}.dist-info             # [unix]
        - lib/python{{ python_min }}/site-packages/opencv_python_headless-{{ version }}.dist-info    # [unix]
        - Lib/site-packages/cv2                                      # [win]
        - Lib/site-packages/opencv_python-{{ version }}.dist-info             # [win]
        - Lib/site-packages/opencv_python_headless-{{ version }}.dist-info    # [win]
  - name: opencv
    build:
      python_version_independent: true                                            # [is_abi3]
      string: headless_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                         # [qt_version == "none"]
      string: qt{{ qt_version }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}               # [qt_version != "none"]
    requirements:
      run:
        - {{ pin_subpackage('libopencv', exact=True) }}
        - {{ pin_subpackage('py-opencv', exact=True) }}
    test:
      commands:
        - echo "tested in other outputs"

  - name: py-opencv
    # py-opencv holds the cv2 stable-ABI (abi3) python bindings produced by the
    # single python_min build. python_version_independent makes the one build
    # installable on every later python; python-abi3 supplies the
    # `cpython >={{ python_min }}` lower bound (and excludes free-threading).
    build:
      python_version_independent: true                                            # [is_abi3]
      string: headless_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}                         # [qt_version == "none"]
      string: qt{{ qt_version }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}               # [qt_version != "none"]
      # Do not byte-compile the cv2 .py files at build time. As a
      # python_version_independent (noarch) package the .pyc are regenerated for
      # the target interpreter at install time anyway, and compiling them here
      # would run the host python -- which is impossible when cross-compiling
      # (e.g. osx-64 -> osx-arm64): "Bad CPU type in executable".
      skip_compile_pyc:
        - "*.py"
      run_exports:
        # don't pin the python version so hard.
        # Good compatibility has been found in the python package
        - {{ pin_subpackage('py-opencv') }}
    files:
      include:
        - lib/python{{ python_min }}/site-packages/cv2                                      # [unix]
        - lib/python{{ python_min }}/site-packages/opencv_python-{{ version }}.dist-info             # [unix]
        - lib/python{{ python_min }}/site-packages/opencv_python_headless-{{ version }}.dist-info    # [unix]
        - Lib/site-packages/cv2                                      # [win]
        - Lib/site-packages/opencv_python-{{ version }}.dist-info             # [win]
        - Lib/site-packages/opencv_python_headless-{{ version }}.dist-info    # [win]
    requirements:
      host:
        - python
        - numpy
        - python-abi3                        # [is_abi3]
      run:
        - python >={{ python_min }}
        - numpy
        - {{ pin_subpackage('libopencv', exact=True) }}
    test:
      requires:
        # Test with the two currently supported lapack implementatons.
        # Only a single (python_min) build now happens, so split the backends
        # across platforms instead of across python versions.
        - liblapack * *openblas         # [not linux64]
        - liblapack * *mkl              # [linux64]
        - pip
        - abi3audit                     # [is_abi3]
      imports:
        - cv2
        - cv2.xfeatures2d
        - cv2.freetype
      files:
        - run_py_test.py
        - color_palette_alpha.png
        - test_1_c1.jpg
      source_files:
        - test.avi
      commands:
        # Confirm cv2 was built against the stable ABI and only uses symbols
        # available from python_min onwards.
        - abi3audit $SP_DIR/cv2/python-3/cv2.abi3.so -s -v --assume-minimum-abi3 {{ python_min }}   # [unix and is_abi3]
        - abi3audit %SP_DIR%\\cv2\\python-3\\cv2.pyd -s -v --assume-minimum-abi3 {{ python_min }}    # [win and is_abi3]
        - python run_py_test.py
        - if [[ $($PYTHON -c 'import cv2; print(cv2.__version__)') != $PKG_VERSION ]]; then exit 1; fi  # [unix]
        - python -c "import cv2; assert 'Unknown' not in cv2.videoio_registry.getBackendName(cv2.CAP_V4L)"  # [linux]
        - python -c "import cv2, re; assert re.search('Lapack:\s+YES', cv2.getBuildInformation())"
        - python -c "import cv2, re; assert re.search(r'JPEG 2000:\s+OpenJPEG', cv2.getBuildInformation()), cv2.getBuildInformation()"
        - pip check
        - pip list
        - test $(pip list | grep "opencv-python " | wc -l) -eq 1           # [unix]
        - test $(pip list | grep "opencv-python-headless " | wc -l) -eq 1  # [unix]

about:
